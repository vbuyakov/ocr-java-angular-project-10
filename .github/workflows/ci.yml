name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-api:
    name: Test API (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make scripts executable
        run: chmod +x api/gradlew misc/cicd/run-tests.sh

      - name: Run API tests
        run: ./misc/cicd/run-tests.sh springboot

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: test-results/

  test-web:
    name: Test Web (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Make test script executable
        run: chmod +x misc/cicd/run-tests.sh

      - name: Run web tests
        run: ./misc/cicd/run-tests.sh angular

      - name: Upload web test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-web
          path: test-results/

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x api/gradlew

      - name: Build API JAR
        run: cd api && ./gradlew bootJar -x test --no-daemon

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install and build web
        run: cd web && npm ci && npm run build
