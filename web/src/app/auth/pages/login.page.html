<div class="login-page">
  <div class="login-card card">
    <h1 class="login-title">{{ 'login.title' | translate }}</h1>
    <p class="login-lead" data-testid="login-phase-hint">{{ 'login.lead' | translate }}</p>

    @if (errorMessage(); as err) {
      <div class="login-alert">
        <app-ui-alert variant="danger" [message]="err" testId="login-error" />
      </div>
    }

    <form class="login-form" (submit)="$event.preventDefault(); submit()">
      <app-ui-input
        [label]="'login.usernameLabel' | translate"
        [placeholder]="'login.usernamePlaceholder' | translate"
        autocomplete="username"
        testId="login-username"
        [value]="username()"
        (valueChange)="onUsername($event)"
      />
      <app-ui-input
        [label]="'login.passwordLabel' | translate"
        [placeholder]="'login.passwordPlaceholder' | translate"
        inputType="password"
        autocomplete="current-password"
        testId="login-password"
        [value]="password()"
        (valueChange)="onPassword($event)"
      />
      <app-ui-button
        variant="primary"
        type="submit"
        testId="login-submit"
        [disabled]="submitting()"
      >
        @if (submitting()) {
          {{ 'login.submitting' | translate }}
        } @else {
          {{ 'login.submit' | translate }}
        }
      </app-ui-button>
    </form>
  </div>
</div>
